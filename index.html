<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de tareas</title>
  <link rel="stylesheet" href="styles.css" />
</head>

  <script src="app.js"></script>
</body>
</html>

<body>
  <!-- CABECERA -->
  <header class="app-header">
    <h1>App UNO Taskflow</h1>
    <p class="subtitle">Comer helado es prioridad</p>
  </header>

  <!-- CONTENEDOR TIPO FORO -->
  <div class="page-wrapper">
    <div class="layout">
      <!-- BARRA LATERAL -->
      <aside class="sidebar">
        <section class="search-section"> <!-- BUSCADOR -->
          <label for="search" class="field-label">Buscar:</label>
          <input
            id="search"
            type="text"
            class="search-input"
            placeholder="(ej. 'sorbete de frambuesa')"
          />
        </section>      

        <section class="menu-section"> <!-- NUEVO MENÚ DE CATEGORÍAS -->
          <p class="menu-title">CATEGORÍAS:</p>
          <div id="category-menu" class="category-menu">
            <!-- Aquí se pintarán las categorías dinámicamente -->
          </div>
                 
          <section class="menu-section stats-section"> <!-- SECCIÓN DE ESTADÍSTICAS -->
            <p class="menu-title">ESTADÍSTICAS:</p>
            <ul class="stats-list">
              <li>Total: <span id="stats-total">0</span></li>
              <li>Completadas: <span id="stats-completed">0</span></li>
              <li>Pendientes: <span id="stats-pending">0</span></li>
            </ul>
        </section>
      </aside>    
 
        <section class="menu-section"> <!-- FILTRO DE PRIORIDAD -->
          <p class="menu-title">Filtrar:</p>
          <div id="priority-menu" class="priority-menu">
            <button type="button" class="priority-filter active" data-priority="">Todas</button>
            <button type="button" class="priority-filter" data-priority="high">Alta</button>
            <button type="button" class="priority-filter" data-priority="medium">Media</button>
            <button type="button" class="priority-filter" data-priority="low">Baja</button>
          </div>  

      <!-- CONTENIDO PRINCIPAL -->
      <main>
        <section class="task-section">
          <h2>Nueva tarea</h2>

          <form id="task-form" class="task-form">
            <div class="form-row">
              <label for="task-title">Título:</label>
              <input
                type="text"
                id="task-title"
                name="title"
                required
                placeholder="Escribe aquí la tarea…"
              />
            </div>

            <div class="form-row">
              <label for="task-tags">Categorías (separadas por comas):</label>
              <input
                type="text"
                id="task-tags"
                name="tags"
                placeholder="ej: DAM, estudio, prácticas"
              />
            </div>

            <div class="form-row">
              <label for="task-priority">Prioridad:</label>
              <select id="task-priority" name="priority">
                <option value="high">Alta</option>
                <option value="medium">Media</option>
                <option value="low">Baja</option>
              </select>
            </div>

            <div class="form-row">
              <label for="task-deadline">Tiempo restante (texto):</label>
              <input
                type="text"
                id="task-deadline"
                name="deadline"
                placeholder="ej: 16h left., 2 days left."
              />
            </div>

            <button type="submit" class="btn-primary">Añadir tarea</button>
          </form>
        </section>

  <section class="task-section">
    <h2>Tareas de hoy</h2>

    <ul class="task-list" id="task-list">
      <!-- Las tareas se agregarán aquí dinámicamente -->
       
      <li class="task"> <!-- TAREA 1 -->
              <!-- checkbox oculto que controla el estado -->
              <input type="checkbox" id="task-1" class="task-toggle" />

              <!-- la tarjeta completa es un label: click en cualquier parte cambia el estado -->
              <label for="task-1" class="task-item">
                <div class="task-main">
                  <div class="task-title-row">
                    <h3 class="task-title">Comer Helado</h3>
                    <span class="task-deadline">Cuando apetezca.</span>
                  </div>

                  <div class="task-meta">
                    <div class="task-tags">
                      <span class="task-tag">Alimentación</span>
                      <span class="task-tag">Salud</span>
                      <span class="task-tag">Helado</span>
                    </div>
                  </div>
                </div>

                <span class="task-badge priority-high">Alta</span>
                <button type="button" class="task-delete">Eliminar</button>
              </label>
            </li>
  
            <li class="task">  <!-- TAREA 2 -->
              <input type="checkbox" id="task-2" class="task-toggle" />
              <label for="task-2" class="task-item">
                <div class="task-main">
                  <div class="task-title-row">
                    <h3 class="task-title">Aprender HTML y CSS</h3>
                    <span class="task-deadline">3 months left.</span>
                  </div>

                  <div class="task-meta">
                    <div class="task-tags">
                      <span class="task-tag">DAM</span>
                      <span class="task-tag">Prácticas</span>
                    </div>
                  </div>
                </div>

                <span class="task-badge priority-low">Baja</span>
                <button type="button" class="task-delete">Eliminar</button>
              </label>
            </li>                 
          </ul>
        </section>
      </main>
    </div>
  </div>

  <!-- PIE -->
  <footer class="app-footer">
    App UNO - Organización
  </footer>
</body>
</html>
