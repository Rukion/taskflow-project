<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de tareas</title>
  
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              // opcional: mapeos personalizados
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100">

<!-- CABECERA -->
<header
  class="app-header flex items-center justify-between bg-slate-800 dark:bg-slate-900 text-white px-4 py-3 border-b border-slate-900">
  <div>
    <h1 class="text-lg font-bold">App UNO Taskflow</h1>
    <p class="subtitle text-xs text-slate-200">
      Contra la procrastinación.
    </p>
  </div>

    <button
    id="theme-toggle"
    type="button"
    class="text-xs px-3 py-1 rounded border border-slate-300 bg-slate-700 hover:bg-slate-600 dark:bg-slate-100 dark:text-slate-900 dark:border-slate-300 dark:hover:bg-white">
    🌙 Modo oscuro
  </button>
</header>

  <!-- CONTENEDOR TIPO FORO -->  
<div class="page-wrapper max-w-3xl mx-auto bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 min-h-screen">    
    
    <div class="top-searchbar"> <!-- BUSCADOR GLOBAL FIJO ARRIBA -->
      <span class="search-icon">🔎</span>
      <input 
        id="search"
        type="text"
        class="top-search-input"
        placeholder="Buscar..."
      />
    </div>

    <div class="layout">
      <!-- BARRA LATERAL -->
      <aside class="sidebar">
        <section class="menu-section"> <!-- NUEVO MENÚ DE CATEGORÍAS -->
          <p class="menu-title">CATEGORÍAS:</p>
          <div id="category-menu" class="category-menu">
            <!-- Aquí se pintarán las categorías dinámicamente -->
          </div>
                 
          <section class="menu-section stats-section"> <!-- SECCIÓN DE ESTADÍSTICAS -->
            <p class="menu-title">ESTADÍSTICAS:</p>
            <ul class="stats-list">
              <li>Total: <span id="stats-total">0</span></li>
              <li>Completadas: <span id="stats-completed">0</span></li>
              <li>Pendientes: <span id="stats-pending">0</span></li>
            </ul>
        </section>
      </aside>    
 
        <section class="menu-section"> <!-- FILTRO DE PRIORIDAD -->
          <p class="menu-title">Filtrar:</p>
          <div id="priority-menu" class="priority-menu">
            <button type="button" class="priority-filter active" data-priority="">Todas</button>
            <button type="button" class="priority-filter" data-priority="high">Alta</button>
            <button type="button" class="priority-filter" data-priority="medium">Media</button>
            <button type="button" class="priority-filter" data-priority="low">Baja</button>
          </div>  

      <!-- CONTENIDO PRINCIPAL -->
      <main>
        <section class="task-section collapsible-section">
          <h2 class="collapsible-header">Nueva tarea ▾</h2>
          <div class="collapsible-content">
            <form id="task-form" class="task-form">

              <div class="form-row">
                <label for="task-title">Título:</label>
                <input
                  type="text"
                  id="task-title"
                  name="title"
                  required
                  placeholder="Escribe aquí la tarea…"
                />
              </div>

              <div class="form-row">
                <label for="task-tags">Categorías (separadas por comas):</label>
                <input
                  type="text"
                  id="task-tags"
                  name="tags"
                  placeholder="ej: DAM, estudio, prácticas"
                />
              </div>

              <div class="form-row">
                <label for="task-deadline">Tiempo restante (texto):</label>
                <input
                  type="text"
                  id="task-deadline"
                  name="deadline"
                  placeholder="ej: 16h left., 2 days left."
                />
              </div>

              <div class="form-row">
                <label for="task-priority">Prioridad:</label>
                <select id="task-priority" name="priority">
                  <option value="high">Alta</option>
                  <option value="medium">Media</option>
                  <option value="low">Baja</option>
                </select>
              </div>
              
            <button type="submit" class="btn-primary px-3 py-1 text-xs font-medium border border-sky-700 bg-sky-100 hover:bg-sky-200 text-sky-900 rounded dark:bg-sky-700 dark:text-white dark:hover:bg-sky-600"
            >Añadir tarea</button>

            </form>
          </div>
        </section>

  <section class="task-section">
    <h2>Tareas pendientes:</h2>
    <ul class="task-list" id="task-list"> <!-- Las tareas se agregarán aquí dinámicamente -->            
    </ul>      
          <div class="task-bulk-actions"> <!-- Acciones masivas sobre tareas -->
            <button
              type="button"
              id="complete-all-tasks"
              class="bulk-action-btn"
            >Todas completadas</button>
            <button
              type="button"
              id="clear-completed-tasks"
              class="bulk-action-btn"
            >Borrar completadas</button>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- PIE -->
  <footer class="app-footer">
    App UNO - Organización
  </footer>
</body>
</html>
